<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian Profile</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-container">
        <a href="#" class="brand">LIBRARY</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Books</a>
            <a href="#" class="signup-btn">Logout</a>
        </div>
    </div>
</nav>

<div class="page-wrapper">
    <div class="profile-card">
        <h1>Librarian Profile</h1>
        <p class="welcome-msg" id="welcomeUser">Welcome, Staff Member</p>

        <section class="profile-section">
            <h3>Personal Information</h3>
            <div class="input-group">
                <label>Name:</label>
                <input type="text" id="profileName" placeholder="Name">
            </div>
            <div class="input-group">
                <label>Email:</label>
                <input type="email" id="profileEmail" placeholder="Email">
            </div>
            <div class="input-group">
                <label>Phone:</label>
                <input type="text" id="profilePhone" placeholder="Phone">
            </div>
        </section>

        <section class="profile-section">
            <h3>Assigned Sections</h3>
            <div id="sectionList">
                <div class="activity-item">Action</div>
                <div class="activity-item">Fiction </div>
            </div>
        </section>

        <section class="profile-section">
            <h3>Responsibilities</h3>
            <div id="responsibilityList">
                <div class="activity-item">Inventory Management</div>
                <div class="activity-item">New Book Cataloging</div>
            </div>
        </section>
    </div>
</div>

<script src="/js/profile.js"></script>
</body>
</html>
