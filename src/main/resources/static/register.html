<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS-ul -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- WRAPPER -->
<div class="page-wrapper">

    <!-- REGISTER BOX -->
    <div class="register-container">
        <h1>Library System</h1>
        <h2>Join our community</h2>

        <form id="registerForm">

            <div class="input-group-custom">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="First name and last name" required>
            </div>

            <div class="input-group-custom">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>

            <div class="input-group-custom">
                <label>Phone Number</label>
                <input type="text" id="phone" placeholder="07xxxxxxxx" required>
            </div>

            <div class="input-group-custom">
                <label>Address</label>
                <input type="text" id="address" placeholder="Your address" required>
            </div>

            <div class="input-group-custom">
                <label>Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
            </div>

            <div class="input-group-custom">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>

            <div class="input-group-custom">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat password" required>
            </div>

            <button type="submit" class="register-btn">Create Account</button>
            <p class="mt-3">
                Already have an account?
                <a href="/login.html">Login here</a>
            </p>


        </form>
    </div>

</div>
<script src="/js/navbar.js"></script>
<script src="/js/register.js"></script>
</body>
</html>
