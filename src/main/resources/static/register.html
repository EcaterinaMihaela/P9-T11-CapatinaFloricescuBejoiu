<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS-ul tău -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark custom-navbar shadow">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3 brand-text" href="#">Library System</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-white" href="BooksCatalogInterface.html">Public Catalog</a>
                </li>
                <li class="nav-item">
                    <a href="login.html" class="btn btn-outline-light btn-sm ms-lg-3 mt-2 mt-lg-0 fw-bold">Login</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- 🔥 WRAPPER -->
<div class="page-wrapper">

    <!-- REGISTER BOX -->
    <div class="register-container">
        <h1>Library System</h1>
        <h2>Join our community</h2>

        <form>
            <div class="input-group-custom">
                <label>Full Name</label>
                <input type="text" required>
            </div>

            <div class="input-group-custom">
                <label>Email</label>
                <input type="email" required>
            </div>

            <div class="input-group-custom">
                <label>Username</label>
                <input type="text" required>
            </div>

            <div class="input-group-custom">
                <label>Password</label>
                <input type="password" required>
            </div>

            <div class="input-group-custom">
                <label>Confirm Password</label>
                <input type="password" required>
            </div>

            <button type="submit" class="register-btn">Create Account</button>

            <p class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </form>
    </div>

</div>

</body>
</html>
