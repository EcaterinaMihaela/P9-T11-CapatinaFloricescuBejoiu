<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-container">
        <a href="#" class="brand">LIBRARY</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Books</a>
            <a href="#" class="signup-btn">Logout</a>
        </div>
    </div>
</nav>

<div class="page-wrapper">
    <div class="profile-card">
        <h1>My Profile</h1>
        <p class="welcome-msg" id="welcomeUser">Welcome, User</p>

        <section class="profile-section">
            <h3>Personal Information</h3>
            <div class="input-group">
                <label>Name:</label>
                <input type="text" id="profileName" placeholder="Name">
            </div>
            <div class="input-group">
                <label>Email:</label>
                <input type="email" id="profileEmail" placeholder="Email">
            </div>
            <div class="input-group">
                <label>Phone:</label>
                <input type="text" id="profilePhone" placeholder="Phone">
            </div>
            <div class="input-group">
                <label>Address:</label>
                <input type="text" id="profileAddress" placeholder="Address">
            </div>
            <div class="membership-status">
                <strong>Status:</strong> <span class="status-badge" id="profileStatus">Active</span>
            </div>
            <button class="btn" onclick="saveProfile()">Save Profile</button>
        </section>

        <section class="profile-section">
            <h3>Change Password</h3>
            <div class="input-group">
                <label>Current Password:</label>
                <input type="password" id="currPass">
            </div>
            <div class="input-group">
                <label>New Password:</label>
                <input type="password" id="newPass">
            </div>
            <div class="input-group">
                <label>Confirm New Password:</label>
                <input type="password" id="confirmPass">
            </div>
            <button class="btn">Update Password</button>
        </section>

        <section class="profile-section">
            <h3>Activity History</h3>
            <div id="activityList">
                <div class="activity-item">Borrowed "The Great Gatsby" - Due: 2025-03-15</div>
                <div class="activity-item">Reserved "1984" - Status: <span class="status-badge">Pending</span></div>
                <div class="activity-item">Returned "Moby Dick" - 2025-02-28</div>
            </div>
        </section>
    </div>
</div>

<script src="/js/profile.js"></script>
</body>
</html>
