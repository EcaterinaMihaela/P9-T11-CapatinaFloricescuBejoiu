<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="navbar"></div>

<div class="page-wrapper">
    <div class="add-book-container">
        <h1>Add New Book</h1>
        <p>Create a new book entry for the library catalog</p>

        <form id="addBookForm">

            <div class="form-group">
                <label>Book Title</label>
                <input type="text" id="title" placeholder="Enter book title" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <input type="text" id="description" placeholder="Enter description">
            </div>

            <div class="form-group">
                <label>ISBN</label>
                <input type="text" id="isbn" placeholder="Enter ISBN" required>
            </div>

            <div class="form-group">
                <label>Available Stock</label>
                <input type="number" id="stock" placeholder="Enter stock" required>
            </div>

            <div class="form-group">
                <label>Author ID</label>
                <input type="number" id="authorID" placeholder="Ex: 3" required>
            </div>

            <div class="form-group">
                <label>Category ID</label>
                <input type="number" id="categoryID" placeholder="Ex: 4" required>
            </div>

            <div class="form-group">
                <label>Publisher ID</label>
                <input type="number" id="publisherID" placeholder="Ex: 3" required>
            </div>

            <div class="button-group">
                <button type="button" class="btn-cancel"
                        onclick="window.location.href='/librarian-ControlPanel.html'">
                    Cancel
                </button>

                <button type="submit" class="btn-save">
                    Add Book
                </button>
            </div>

        </form>
    </div>
</div>

<script src="/js/navbar.js"></script>
<script src="/js/add-book.js"></script>
</body>
</html>
