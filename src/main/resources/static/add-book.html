<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="navbar"></div>

<div class="container">
    <h1>Add New Book</h1>

    <form id="addBookForm">
        <input type="text" id="title" placeholder="Book title" required>
        <input type="text" id="description" placeholder="Description">
        <input type="text" id="isbn" placeholder="ISBN" required>
        <input type="number" id="stock" placeholder="Stock" required>

        <input type="number" id="authorID" placeholder="Author ID" required>
        <input type="number" id="categoryID" placeholder="Category ID" required>
        <input type="number" id="publisherID" placeholder="Publisher ID" required>

        <button type="submit">Add Book</button>
    </form>
</div>

<script src="/js/navbar.js"></script>
<script src="/js/add-book.js"></script>
</body>
</html>
