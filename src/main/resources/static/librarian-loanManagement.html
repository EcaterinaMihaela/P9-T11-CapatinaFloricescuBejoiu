<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/librarian-loanManagement.css">
</head>
<body>

<div id="navbar"></div>

<div class="admin-container">
    <h1>Loan Management</h1>

    <!-- Filter Section -->
    <div class="filter-section mb-4">
        <div class="row g-3">
            <div class="col-md-3">
                <select class="form-select" id="statusFilter">
                    <option value="">All Statuses</option>
                    <option value="BORROWED">Borrowed</option>
                    <option value="RETURNED">Returned</option>
                    <option value="OVERDUE">Overdue</option>
                </select>
            </div>
            <div class="col-md-3">
                <input type="text" class="form-control" id="memberSearch" placeholder="Search by member...">
            </div>
            <div class="col-md-3">
                <input type="text" class="form-control" id="bookSearch" placeholder="Search by book...">
            </div>
            <div class="col-md-3">
                <button class="btn btn-primary w-100" onclick="applyFilters()">Apply Filters</button>
            </div>
        </div>
    </div>

    <!-- Loans Table -->
    <div id="loanTable">
        <div class="text-center">Loading loans...</div>
    </div>
</div>

<!-- Modal for Extend Due Date -->
<div class="modal fade" id="extendModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Extend Loan Period</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p><strong>Book:</strong> <span id="extendBookTitle"></span></p>
                <p><strong>Member:</strong> <span id="extendMemberName"></span></p>
                <p><strong>Current Due Date:</strong> <span id="extendCurrentDue"></span></p>
                <div class="mb-3">
                    <label for="newDueDate" class="form-label">New Due Date</label>
                    <input type="date" class="form-control" id="newDueDate">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="confirmExtend()">Extend</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/navbar.js"></script>
<script src="/js/librarian-loanManagement.js"></script>

</body>
</html>
