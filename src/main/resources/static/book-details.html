<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - Library System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="details-body">

<div id="navbar"></div>

<div class="container mt-5">
    <div class="details-container">

        <div class="main-info-card">
            <div class="book-cover-wrapper">
                <img id="bookCover" src="https://placehold.co/200x300?text=Loading..." alt="Cover">
            </div>

            <div class="book-specs">
                <h1 id="bookTitle">Loading...</h1>
                <p><strong>Author:</strong> <span id="bookAuthor">...</span></p>
                <p><strong>Category:</strong> <span id="bookCategory">...</span></p>
                <p><strong>Publisher:</strong> <span id="bookPublisher">...</span></p>
                <p><strong>Availability:</strong> <span id="bookStatus">...</span></p>

                <div class="action-buttons mt-4">
                    <button class="btn-borrow" onclick="borrowBook()">Borrow Book</button>
                    <button class="btn-reserve" onclick="reserveBook()">Reserve Book</button>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="info-card h-100">
                    <h3>Description</h3>
                    <p id="bookDescription">Loading description...</p>
                </div>
            </div>

            <div class="col-md-6">
                <div class="info-card h-100 reviews-section">
                    <h3>Reviews</h3>
                    <div id="reviewsList" class="review-list flex-grow-1">
                        <p class="text-muted text-center">No reviews yet.</p>
                    </div>

                    <div class="add-review mt-3 pt-3 border-top">
                        <div class="input-group">
                            <input type="text" id="reviewInput" class="form-control" placeholder="Write a review...">
                            <button class="btn btn-teal" type="button" id="btnPostReview">Post</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/navbar.js"></script>
<script src="js/book-details.js"></script>
</body>
</html>
