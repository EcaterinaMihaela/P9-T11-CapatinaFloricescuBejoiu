<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - Library System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="details-body">

<div id="navbar"></div>

<div class="container mt-5">
    <div class="details-container">

        <div class="main-info-card">
            <div class="book-cover-wrapper">
                <img id="bookCover" src="" alt="Cover">
            </div>
            <div class="book-specs">
                <h1 id="bookTitle">Loading...</h1>
                <p><strong>Author:</strong> <span id="bookAuthor">...</span></p>
                <p><strong>Category:</strong> <span id="bookCategory">...</span></p>
                <p><strong>Publisher:</strong> <span id="bookPublisher">...</span></p>
                <p><strong>Availability:</strong> <span id="bookStatus">...</span></p>
                <div class="action-buttons mt-4">
                    <button class="btn-borrow" onclick="borrowBook()">Borrow Book</button>
                    <button class="btn-reserve" onclick="reserveBook()">Reserve Book</button>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="info-card h-100">
                    <h3>Description</h3>
                    <p id="bookDescription">Loading description...</p>
                </div>
            </div>

            <div class="col-md-6">
                <div class="info-card h-100 reviews-section d-flex flex-column">
                    <h3>Reviews</h3>

                    <div id="reviewsList" class="review-list flex-grow-1">
                        <p class="text-muted text-center py-3">Loading reviews...</p>
                    </div>

                    <div class="add-review mt-3 pt-3 border-top">
                        <p class="small text-muted mb-2">
                            Posting as: <strong id="currentUserDisplay">Visitor</strong>
                        </p>

                        <div class="mb-2">
                            <label class="small fw-bold">Your Rating:</label>
                            <select id="reviewRating" class="form-select form-select-sm rating-select">
                                <option value="5">5 Stars ★★★★★</option>
                                <option value="4">4 Stars ★★★★☆</option>
                                <option value="3">3 Stars ★★★☆☆</option>
                                <option value="2">2 Stars ★★☆☆☆</option>
                                <option value="1">1 Star ★☆☆☆☆</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <input type="text" id="reviewInput" class="form-control" placeholder="Write your thoughts...">
                            <button class="btn btn-teal" type="button" id="btnPostReview">Post</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="review-template">
    <div class="review-item mb-3 p-3 border rounded bg-white shadow-sm">
        <div class="d-flex justify-content-between align-items-start">
            <div class="review-content">
                <div class="d-flex align-items-center gap-2">
                    <strong class="review-user text-dark"></strong>
                    <span class="stars-container text-warning"></span>
                </div>
                <p class="review-text mt-2 mb-0 text-secondary"></p>
            </div>

            <div class="review-actions d-none d-flex gap-2">
                <button class="btn btn-sm btn-teal btn-edit" title="Edit">
                    <i class="bi bi-pencil-square"></i>
                </button>
                <button class="btn btn-sm btn-danger-teal btn-delete" title="Delete">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>
    </div>
</template>

<script src="js/navbar.js"></script>
<script src="js/book-details.js"></script>
</body>
</html>
