<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - Books Catalog</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS-ul -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

<div id="navbar"></div>

<div class="admin-container">
    <h1>Books Catalog</h1>

    <div class="search-bar">
        <input type="text" placeholder="Search for books, authors or categories...">
    </div>

    <div class="filters">
        <select>
            <option>All Authors</option>
        </select>

        <select>
            <option>All Categories</option>
        </select>

        <select>
            <option>All Years</option>
        </select>
    </div>

    <div class="book-grid">

        <div class="book-card">
            <img src="81T4dS6IkaL._AC_UF1000,1000_QL80_ - Copy.jpg">
            <h3>The Great Gatsby</h3>
            <p>F. Scott Fitzgerald</p>
            <p>Classic Literature</p>
            <span class="status-badge available">Available</span>
            <a href="../interfataBook/BookInterface.html" class="details-btn">View Details</a>
        </div>

        <div class="book-card">
            <img src="shopping.webp">
            <h3>Harry Potter</h3>
            <p>J.K. Rowling</p>
            <p>Fantasy</p>
            <span class="status-badge borrowed">Borrowed</span>
            <a href="../interfataBook/BookInterface.html" class="details-btn">View Details</a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/dashboard.js"></script>
<script src="/js/navbar.js"></script>
</body>
</html>
