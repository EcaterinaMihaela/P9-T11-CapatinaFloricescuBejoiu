<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/profile.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div id="navbar"></div>

<div class="container mt-5 d-flex justify-content-center">

    <div class="card shadow-lg p-4" style="width: 700px; border-radius: 15px;">

        <!-- HEADER -->
        <div class="text-center mb-3">
            <div style="font-size: 50px;">👤</div>
            <h3 id="username"></h3>
            <span class="badge bg-primary" id="role"></span>
        </div>

        <hr>

        <!-- FORM -->
        <form id="profileForm">

            <div class="row g-3">

                <!-- First Name -->
                <div class="col-md-6">
                    <label class="form-label">First Name</label>
                    <input class="form-control" id="firstName" readonly>
                </div>

                <!-- Last Name -->
                <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    <input class="form-control" id="lastName" readonly>
                </div>

                <!-- Email (DOAR VIEW) -->
                <div class="col-md-12">
                    <label class="form-label">Email</label>
                    <input class="form-control" id="email" disabled>
                </div>

                <!-- Phone -->
                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input class="form-control" id="phone" readonly>
                </div>

                <!-- Address -->
                <div class="col-md-6">
                    <label class="form-label">Address</label>
                    <input class="form-control" id="address" readonly>
                </div>

            </div>

            <!-- BUTTONS -->
            <div class="text-center mt-4">

                <button type="button" id="editBtn" class="btn btn-outline-primary">
                    Edit Profile
                </button>

                <button type="button" id="saveBtn" class="btn btn-success ms-2">
                    Save Changes
                </button>

            </div>

        </form>

    </div>

</div>

<script src="/js/profile.js"></script>
<script src="/js/navbar.js"></script>

</body>
</html>
