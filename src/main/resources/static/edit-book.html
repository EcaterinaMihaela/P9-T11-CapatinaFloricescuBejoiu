<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div id="navbar"></div>

<div class="container mt-5" style="max-width: 750px;">
    <h2 class="mb-4">Edit Book</h2>

    <form id="editBookForm" class="p-4 shadow rounded bg-white">

        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" id="title" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <input type="text" id="description" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">ISBN</label>
            <input type="text" id="isbn" class="form-control" required>
        </div>

        <img id="coverPreview"
             src=""
             alt="Preview"
             style="display:none; width:120px; margin-bottom:15px; border-radius:8px;">

        <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" id="stock" class="form-control" min="0" required>
        </div>

        <!-- AUTHORS -->
        <div class="mb-3">
            <label class="form-label">Author</label>
            <select id="authorID" class="form-select" required></select>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <select id="categoryID" class="form-select" required></select>
        </div>

        <div class="mb-3">
            <label class="form-label">Publisher</label>
            <select id="publisherID" class="form-select" required></select>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Save Changes
        </button>
    </form>
</div>

<script src="/js/navbar.js"></script>
<script src="/js/edit-book.js"></script>

</body>
</html>
