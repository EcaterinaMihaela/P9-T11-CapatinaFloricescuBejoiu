<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/library-statistics.css">
</head>

<body>

<div id="navbar"></div>

<div class="admin-container">
    <h1>Library Dashboard</h1>

    <div class="dashboard-grid">

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Books</h3>
                <p id="totalBooks">0</p>
            </div>

            <div class="stat-card">
                <h3>Available Books</h3>
                <p id="availableBooks">0</p>
            </div>

            <div class="stat-card">
                <h3>Authors</h3>
                <p id="totalAuthors">0</p>
            </div>

            <div class="stat-card">
                <h3>Categories</h3>
                <p id="totalCategories">0</p>
            </div>

                <div class="stat-card reservation-pending">
                    <h3>Pending Reservations</h3>
                    <p id="pendingReservations">0</p>
                </div>

                <div class="stat-card reservation-accepted">
                    <h3>Accepted Reservations</h3>
                    <p id="acceptedReservations">0</p>
                </div>
        </div>

        <div class="notifications-panel">
            <h2>Recent Books</h2>
            <div id="recentBooks"></div>
        </div>

    </div>
</div>

<script src="/js/navbar.js"></script>
<script src="/js/library-statistics.js"></script>
</body>
</html>
