<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Publisher Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar"></div>


<div class="management-container">
    <h1>Publisher Administration</h1>
    
    <div class="info-box">
        <h3 id="form-title">Add New Publisher</h3>

        <form id="publisherForm">
            <input type="hidden" id="publisherId">

            <div class="form-group">
                <label for="publisherName">Publisher Name:</label>
                <input type="text" id="publisherName" required placeholder="e.g., Penguin Books">
            </div>

            <div class="button-group">
                <button type="submit" class="btn-save">Save Publisher</button>
                <button type="button" class="btn-cancel" onclick="resetPublisherForm()">Cancel</button>
            </div>
        </form>
    </div>

    <hr>

    <h3>Publisher List</h3>
    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Publisher Name</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="publisherTableBody">
            </tbody>
        </table>
    </div>
</div>

<script src="js/navbar.js"></script>
<script src="js/publisher-management.js"></script>
</body>
</html>
