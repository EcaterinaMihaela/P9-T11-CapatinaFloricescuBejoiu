<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Analytics</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS GLOBAL (dacă îl folosești) -->
    <link rel="stylesheet" href="/css/style.css">

    <!-- CSS PAGINĂ -->
    <link rel="stylesheet" href="/css/reports.css">
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- CONTENT -->
<div class="admin-container">

    <h1>Reports & Analytics</h1>

    <!-- FILTERS -->
    <div class="filters-box">
        <h5>Filters</h5>

        <div class="filters-row">
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="BOOKS">Books</option>
                <option value="USERS">Users</option>
                <option value="LOANS">Loans</option>
                <option value="RESERVATIONS">Reservations</option>
            </select>

            <input type="month" id="monthFilter" class="form-control">

            <button onclick="generateReport()" class="btn btn-primary">
                Generate
            </button>

            <button onclick="exportPDF()" class="btn btn-success">
                Export PDF
            </button>
        </div>
    </div>

    <!-- ANALYTICS -->
    <div class="analytics-grid">

        <div class="card-box">
            <h5>Most Borrowed Books</h5>
            <ul id="topBooks"></ul>
        </div>

        <div class="card-box">
            <h5>Overdue Returns</h5>
            <ul id="overdueList"></ul>
        </div>

    </div>

    <!-- MONTHLY -->
    <div class="card-box mt-4">
        <h5>Monthly Activity</h5>

        <p>Total Loans: <span id="totalLoans">0</span></p>
        <p>New Books: <span id="newBooks">0</span></p>
        <p>Reservations: <span id="totalReservations">0</span></p>
        <p>Active Users: <span id="activeUsers">0</span></p>
    </div>

</div>

<!-- SCRIPTS (ORDINE CORECTĂ) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/navbar.js"></script>
<script src="/js/reports.js"></script>

</body>
</html>
